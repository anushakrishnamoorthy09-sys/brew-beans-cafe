<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Menu | Brew & Beans</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navbar -->
  <header>
    <nav class="navbar menu-navbar">
      <div class="logo">
        <h2>☕ Brew & Beans</h2>
      </div>

      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="menu.html">Menu</a></li>
        <li><a href="about.html">About Us</a></li>
        <li><a href="gallery.html">Gallery</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>

    <button class="order-btn"
        onclick="window.location.href='order.html'">
    Order Online
</button>
    </nav>
  </header>

  <!-- Menu Section -->
  <section class="menu-section">

    <h1>Our Menu</h1>

 <div class="menu-buttons">
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="coffee">Coffee</button>
  <button class="filter-btn" data-filter="non-coffee">Non-Coffee</button>
  <button class="filter-btn" data-filter="snacks">Snacks</button>
  <button class="filter-btn" data-filter="desserts">Desserts</button>
 </div>

    <div class="menu-container">

      <div class="menu-card" data-category="coffee">
        <img src="images/menu/cauppocino.jpg" alt="Cappuccino">
        <h3>Cappuccino</h3>
        <p>₹160</p>
      </div>

      <div class="menu-card" data-category="coffee">
        <img src="images/menu/lattee.jpg" alt="Latte">
        <h3>Latte</h3>
        <p>₹180</p>
      </div>

      <div class="menu-card" data-category="snacks">
        <img src="images/menu/fries.jpg" alt="French Fries">
        <h3>French Fries</h3>
        <p>₹110</p>
      </div>

      <div class="menu-card" data-category="desserts">
        <img src="images/menu/brownie.jpg" alt="Brownie">
        <h3>Chocolate Brownie</h3>
        <p>₹120</p>
      </div>

      <div class="menu-card" data-category="non-coffee">
        <img src="images/menu/hot-chocolate.jpg" alt="Hot Chocolate">
        <h3>Hot Chocolate</h3>
        <p>₹100</p>
      </div>

      <div class="menu-card" data-category="snacks">
        <img src="images/menu/cheese-sandwich.jpg" alt="Cheese Sandwich">
        <h3>Cheese Sandwich</h3>
        <p>₹90</p>
      </div>

      <div class="menu-card" data-category="coffee">
        <img src="images/menu/mocha.jpg" alt="Mocha">
        <h3>Mocha</h3>
        <p>₹230</p>
      </div>

      <div class="menu-card" data-category="desserts">
        <img src="images/menu/chocolate-cake.jpg" alt="Chocolate cake">
        <h3>Chocolate cake</h3>
        <p>₹95</p>
      </div>

    </div>
 
  </section>
<script src="js/menu.js"></script>
<script src="js/cart.js"></script>
</body>
</html>
