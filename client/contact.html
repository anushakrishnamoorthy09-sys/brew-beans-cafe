<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | Brew & Beans</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navbar -->
  <header>
    <nav class="navbar menu-navbar">
      <div class="logo">
        <h2>☕ Brew & Beans</h2>
      </div>

      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="menu.html">Menu</a></li>
        <li><a href="about.html">About Us</a></li>
        <li><a href="gallery.html">Gallery</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>

      <button class="order-btn">Order Online</button>
    </nav>
  </header>

  <!-- Hero -->
  <section class="contact-hero">
    <h1>Contact Us</h1>
    <p>We'd love to hear from you.</p>
  </section>

  <!-- Contact Section -->
  <section class="contact-section">

    <!-- Contact Info -->
    <div class="contact-info">

      <div class="info-card">
        <h3>📍 Address</h3>
        <p>123 Coffee Street, Chennai, India</p>
      </div>

      <div class="info-card">
        <h3>📞 Phone</h3>
        <p>+91 9876543210</p>
      </div>

      <div class="info-card">
        <h3>📧 Email</h3>
        <p>hello@brewandbeans.com</p>
      </div>

    </div>

    <!-- Contact Form -->
    <form
  id="contactForm"
  class="contact-form"
>

  <input
    type="text"
    id="name"
    placeholder="Your Name"
    required
  >

  <input
    type="email"
    id="email"
    placeholder="Your Email"
    required
  >

  <input
    type="text"
    id="subject"
    placeholder="Subject"
  >

  <textarea
    id="message"
    placeholder="Your Message"
    required
  ></textarea>

  <button type="submit">
    Send Message
  </button>

</form>

<p id="responseMessage"></p>

  </section>

 <script src="js/contact.js"></script>

</body>
</html>
